          return;
        }
        const xs = points.map((roiPoint) => roiPoint.x);
        const ys = points.map((roiPoint) => roiPoint.y);
        roi = {
          minX: Math.min(...xs),
          maxX: Math.max(...xs),
          minY: Math.min(...ys),
          maxY: Math.max(...ys),
          points,
        };
        rois.push(cloneRoi(roi));
        roiFirstCorner = null;
        roiDraftPoints = [];
        roiSelectionActive = false;
        volumeCalculationActive = false;
        showFilteredRegion = false;
        selectRoiButton.classList.remove("active");
        selectExcludeButton.classList.remove("active");
        calculateVolumeButton.classList.remove("active");
        roiStatusText =
          `ROI: ${rois.length} rectangle${rois.length > 1 ? "s" : ""}; right angles enforced; ` +
          points.map(formatPoint).join("; ");
        updateCalibrationDisplay();
        volumeDisplay.textContent = "Volume: -- m³";
        updateDisplayedPoints();
        updateCalculateButtonState();
        updateDebugClusterButton();
        setOperationStatus(
          `ROI ${rois.length} selected: full point cloud kept visible for adding more ROIs`,
        );
      }

      function updateRoiDraftStatus(messagePrefix = "ROI") {
        roiFirstCorner = roiDraftPoints[0] || null;
        const label = roiSelectionMode === "exclude" ? "Exclude" : "ROI";
        if (roiDraftPoints.length === 0) {
          roiStatusText = `${label}: select point 1/${roiRequiredClicks}`;
          setOperationStatus(`${messagePrefix}: select point 1/${roiRequiredClicks}`);
        } else {
          const latestPoint = roiDraftPoints[roiDraftPoints.length - 1];
          roiStatusText =
            `${label}: point ${roiDraftPoints.length}/${roiRequiredClicks} selected (${formatPoint(latestPoint)}); ` +
            `select point ${roiDraftPoints.length + 1}/${roiRequiredClicks}`;
          setOperationStatus(
            `${messagePrefix}: point ${roiDraftPoints.length}/${roiRequiredClicks} selected; select point ${roiDraftPoints.length + 1}/${roiRequiredClicks}`,
          );
        }
        updateCalibrationDisplay();
      }

      function render(now) {
        resizeCanvas();
        gl.clearColor(0.043, 0.059, 0.078, 1);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        gl.useProgram(program);
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 3, gl.FLOAT, false, 0, 0);
        gl.bindBuffer(gl.ARRAY_BUFFER, labelBuffer);
        gl.enableVertexAttribArray(labelLocation);
        gl.vertexAttribPointer(labelLocation, 1, gl.FLOAT, false, 0, 0);
        gl.uniformMatrix4fv(matrixLocation, false, viewMatrix());
        gl.uniform1f(pointSizeLocation, Number(pointSizeInput.value) * (window.devicePixelRatio || 1));
        gl.drawArrays(gl.POINTS, 0, pointCount);
        updateRoiOverlay();

        frameCount++;
        if (now - lastMetricTime > 1000) {
          fps = Math.round((frameCount * 1000) / (now - lastMetricTime));
          frameCount = 0;
          lastMetricTime = now;
          if (sourceTotalPointCount > pointCount) {
            metrics.textContent =
              `${pointCount.toLocaleString()} shown / ${sourceTotalPointCount.toLocaleString()} points · ${fps} fps`;
          } else {
            metrics.textContent = `${pointCount.toLocaleString()} points · ${fps} fps`;
          }
        }
        requestAnimationFrame(render);
      }

      function connect() {
        const source = currentPointCloudSource();
        const url = source.url;
        const sessionId = ++liveSessionId;
        const socket = new WebSocket(url);
        currentSocket = socket;
        socket.binaryType = "arraybuffer";
        receivedLiveFrameCount = 0;
        lastLiveReceiveStatusTime = 0;

        if (sourceMode === "live" && liveReceiveActive) {
          statusDot.className = "dot";
          statusText.textContent = "Connecting";
          setOperationStatus(`Connecting to ${source.name}: ${url}`);
        }

        socket.onopen = () => {
          if (sessionId !== liveSessionId || currentSocket !== socket) {
            socket.close();
            return;
          }
          if (sourceMode === "live") {
            statusDot.className = "dot connected";
            statusText.textContent = liveReceiveActive ? `Connected: ${source.name}` : "Live idle";
          }
          resolveSocketOpenWaiters(socket);
          sendStreamControl(liveReceiveActive);
          sendPatchworkControl(patchworkRealtimeActive);
          sendCalibrationToServer();
          if (liveReceiveActive) {
            setOperationStatus(`Connected to ${source.name}; waiting for point cloud frames`);
          }
        };

        socket.onmessage = (event) => {
          if (sessionId !== liveSessionId || currentSocket !== socket) {
            return;
          }
          const receiveEpoch = liveReceiveEpoch;
          const data = event.data;
          if (typeof data === "string") {
            try {
              const message = JSON.parse(data);
              if (message.type === "volume") {
                if (sourceMode === "live" && pileMask && volumeCalculationActive) {
                  return;
                }
                const volume = Number(message.volume_m3);
                const cells = Number(message.cells || 0);
                const windowSeconds = Number(message.window_seconds || 0);
                const windowText = windowSeconds > 0 ? ` · ${windowSeconds.toFixed(0)}s` : "";
                volumeDisplay.textContent = `Volume: ${volume.toFixed(3)} m³ · ${cells.toLocaleString()} cells${windowText} · server`;
                setOperationStatus(`Server volume updated: ${volume.toFixed(3)} m³`);
              } else if (message.type === "patchwork_result") {
                const a = Number(message.ground_a);
                const b = Number(message.ground_b);
                const c = Number(message.ground_c);
                const d = Number(message.ground_d);
                if ([a, b, c, d].every(Number.isFinite)) {
                  groundPlane = { a, b, c, d };
                  groundFitted = true;
                  pendingPatchworkBinary = true;
                  updateCalibrationDisplay();
                  const groundCount = Number(message.ground_points || 0);
                  const nongroundCount = Number(message.nonground_points || 0);
                  setOperationStatus(
                    `Patchwork++ succeeded: blue ground points / yellow non-ground points (${groundCount.toLocaleString()} / ${nongroundCount.toLocaleString()})`,
                  );
                }
              } else if (message.type === "patchwork_status") {
                const text = String(message.message || "Patchwork++ failed");
                setOperationStatus(text, message.level === "error");
              }
            } catch {
              return;
            }
            return;
          }
          if (!(data instanceof ArrayBuffer) || data.byteLength === 0) {
            return;
          }
          if (pendingPatchworkBinary) {
            pendingPatchworkBinary = false;
            const values = new Float32Array(data);
            const pointTotal = Math.floor(values.length / 4);
            const allPoints = new Float32Array(pointTotal * 3);
            const allLabels = new Float32Array(pointTotal);
            let nongroundCount = 0;
            for (let index = 0; index < pointTotal; index++) {
              const inOffset = index * 4;
              const outOffset = index * 3;
              allPoints[outOffset] = values[inOffset];
              allPoints[outOffset + 1] = values[inOffset + 1];
              allPoints[outOffset + 2] = values[inOffset + 2];
              const label = values[inOffset + 3] > 0.5 ? 1 : 0;
              allLabels[index] = label;
              if (label > 0.5) {
                nongroundCount++;
              }
            }

            const nongroundPoints = new Float32Array(nongroundCount * 3);
            let out = 0;
            for (let index = 0; index < pointTotal; index++) {
              if (allLabels[index] <= 0.5) {
                continue;
              }
              const offset = index * 3;
              nongroundPoints[out++] = allPoints[offset];
              nongroundPoints[out++] = allPoints[offset + 1];
              nongroundPoints[out++] = allPoints[offset + 2];
            }

            patchworkSegmentationActive = true;
            segmentationDisplayPoints = allPoints;
            segmentationDisplayLabels = allLabels;
            latestPoints = nongroundPoints;
            sourceTotalPointCount = nongroundCount;
            roiStatusText = `Patchwork++: ${nongroundCount.toLocaleString()} nonground points available for ROI and Cluster`;
            updateCalibrationDisplay();
            updateDisplayedPoints();
            updateSegmentationLegend();
            computeBrowserVolume(true);
            return;
          }
          if (!liveReceiveActive) {
            return;
          }
          if (receiveEpoch !== liveReceiveEpoch) {
            return;
          }
          receivedLiveFrameCount++;
          latestLiveRawPoints = new Float32Array(data);
          const liveInputPoints = appendLiveFrame(latestLiveRawPoints);
          if (patchworkRealtimeActive) {
            return;
          }
          if (patchworkSegmentationActive) {
            patchworkSegmentationActive = false;
            segmentationDisplayPoints = new Float32Array();
            segmentationDisplayLabels = new Float32Array();
            roiStatusText = "Patchwork++ result cleared: live sliding window resumed";
            updateCalibrationDisplay();
            updateSegmentationLegend();
          }
          if (liveStructureFilterActive) {
            try {
              setLiveSourcePoints(applyStructureFilterToPoints(liveInputPoints).points);
            } catch (error) {
              liveStructureFilterActive = false;
              setLiveSourcePoints(liveInputPoints);
              setOperationStatus(`Live structure filter disabled: ${error.message}`, true);
            }
          } else {
            setLiveSourcePoints(liveInputPoints);
          }
          if (sourceMode === "live") {
            latestPoints = latestLivePoints;
            updateDisplayedPoints();
          }
        };

        socket.onclose = () => {
          if (sessionId !== liveSessionId) {
            return;
          }
          rejectSocketOpenWaiters(new Error(`Connection closed for ${source.name}`));
          if (currentSocket === socket) {
            currentSocket = null;
          }
          if (sourceMode === "live") {
            statusDot.className = "dot error";
            statusText.textContent = liveReceiveActive ? "Disconnected" : "Live idle";
            if (liveReceiveActive) {
              setOperationStatus(`Disconnected from ${source.name}: ${url}`, true);
            }
          }
          if (sourceMode === "live" && liveReceiveActive) {
            setTimeout(connect, 1000);
          }
        };

        socket.onerror = () => {
          if (sessionId !== liveSessionId || currentSocket !== socket) {
            return;
          }
          rejectSocketOpenWaiters(new Error(`Connection error for ${source.name}`));
          if (sourceMode === "live") {
            statusDot.className = "dot error";
            statusText.textContent = liveReceiveActive ? "Connection error" : "Live idle";
            if (liveReceiveActive) {
              setOperationStatus(`Connection error for ${source.name}: ${url}`, true);
            }
          }
          socket.close();
        };
      }

      canvas.addEventListener("pointerdown", (event) => {
        if (roiSelectionActive) {
          if (roiSelectionMode === "exclude") {
            if (event.button === 2) {
              closeScreenExcludeSelection();
            } else {
              addScreenExcludePoint(event);
            }
            return;
          }
          selectRoiCorner(event);
          return;
        }
        dragging = true;
        dragMode = event.button === 2 ? "pan" : "rotate";
        lastX = event.clientX;
        lastY = event.clientY;
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!dragging) {
          return;
        }
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        lastX = event.clientX;
        lastY = event.clientY;
        if (dragMode === "pan") {
          const panScale = distance * 0.0015;
          panX += dx * panScale;
          panY -= dy * panScale;
        } else {
          yaw += dx * 0.006;
          pitch = Math.max(-1.45, Math.min(1.2, pitch + dy * 0.006));
        }
      });

      canvas.addEventListener("pointerup", () => {
        dragging = false;
      });

      canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      window.addEventListener("keydown", (event) => {
        if (!roiSelectionActive || roiSelectionMode !== "exclude" || event.key !== "Enter") {
          return;
        }
        event.preventDefault();
        finishScreenExcludeSelection();
      });

      canvas.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          distance = Math.max(2, Math.min(180, distance * Math.exp(event.deltaY * 0.001)));
        },
        { passive: false },
      );

      fitGroundButton.addEventListener("click", fitGroundPlane);

      selectRoiButton.addEventListener("click", () => {
        const wasActive = roiSelectionActive && roiSelectionMode === "include";
        roiSelectionActive = !wasActive;
        roiSelectionMode = "include";
        roiFirstCorner = null;
        roiDraftPoints = [];
        selectRoiButton.classList.toggle("active", roiSelectionActive);
        selectExcludeButton.classList.remove("active");
        roiStatusText = roiSelectionActive ? `ROI: select point 1/${roiRequiredClicks}` : "ROI: selection canceled";
        setOperationStatus(
          roiSelectionActive
            ? `ROI rectangle selection started: select point 1/${roiRequiredClicks}; adjacent edges will be 90 degrees`
            : "ROI selection canceled",
        );
        updateCalibrationDisplay();
      });

      selectExcludeButton.addEventListener("click", () => {
        const wasActive = roiSelectionActive && roiSelectionMode === "exclude";
        roiSelectionActive = !wasActive;
        roiSelectionMode = "exclude";
        roiFirstCorner = null;
        roiDraftPoints = [];
        excludeDraftScreenPoints = [];
        excludeDraftClosed = false;
        selectExcludeButton.classList.toggle("active", roiSelectionActive);
        selectRoiButton.classList.remove("active");
        roiStatusText = roiSelectionActive
          ? "Exclude: left-click polygon points; right-click to close; Enter to confirm"
          : "Exclude: selection canceled";
        setOperationStatus(
          roiSelectionActive
            ? "Exclude screen polygon started: left-click points, right-click to close, then press Enter"
            : "Exclude selection canceled",
        );
        updateCalibrationDisplay();
        updateRoiOverlay();
      });

      calculateVolumeButton.addEventListener("click", () => {
        if (!pileMask) {
          volumeDisplay.textContent = "Volume: -- m³";
          setOperationStatus("Calculate failed: run Cluster first", true);
          return;
        }
        pushUndoState("Calculate");
        volumeCalculationActive = true;
        showFilteredRegion = true;
        calculateVolumeButton.classList.add("active");
        volumeDisplay.textContent = "Volume: calculating...";
        if (sourceMode === "live") {
          sendCalibrationToServer(false);
        }
        setOperationStatus("Cluster volume calculation started");
        setTimeout(() => computeBrowserVolume(true), 0);
      });

      undoRoiButton.addEventListener("click", () => {
        if (roiSelectionActive) {
          if (roiSelectionMode === "exclude") {
            if (excludeDraftClosed) {
              excludeDraftClosed = false;
              roiStatusText =
                `Exclude: polygon reopened with ${excludeDraftScreenPoints.length} screen points; right-click to close`;
              setOperationStatus("Exclude close undone; right-click to close again or undo points");
              updateCalibrationDisplay();
              updateRoiOverlay();
            } else if (excludeDraftScreenPoints.length > 0) {
              excludeDraftScreenPoints.pop();
              roiStatusText =
                excludeDraftScreenPoints.length > 0
                  ? `Exclude: ${excludeDraftScreenPoints.length} screen point${excludeDraftScreenPoints.length > 1 ? "s" : ""}; right-click to close, Enter to confirm`
                  : "Exclude: left-click polygon points; right-click to close, Enter to confirm";
              setOperationStatus("Exclude point undone");
              updateCalibrationDisplay();
              updateRoiOverlay();
            } else {
              roiSelectionActive = false;
              roiSelectionMode = "include";
              selectExcludeButton.classList.remove("active");
              roiStatusText = "Exclude: selection canceled";
              setOperationStatus("Exclude selection canceled");
              updateCalibrationDisplay();
              updateRoiOverlay();
            }
            return;
          }
          if (roiDraftPoints.length > 0) {
            const removed = roiDraftPoints.pop();
            updateRoiDraftStatus(
              removed
                ? `ROI point undone (${formatPoint(removed)})`
                : "ROI point undone",
            );
          } else {
            roiSelectionActive = false;
            roiFirstCorner = null;
            roiDraftPoints = [];
            selectRoiButton.classList.remove("active");
            selectExcludeButton.classList.remove("active");
            roiStatusText = rois.length > 0 || roi ? "ROI: selection canceled; previous ROI kept" : "ROI: none";
            updateCalibrationDisplay();
            setOperationStatus(`${roiSelectionMode === "exclude" ? "Exclude" : "ROI"} selection canceled`);
          }
          return;
        }
        const previous = undoStack.pop();
        if (!previous) {
          setOperationStatus("Undo failed: no previous operation", true);
          return;
        }
        restoreUndoState(previous);
        setOperationStatus(`Undone: ${previous.label}`);
      });

      loadLasButton.addEventListener("click", () => {
        lasFileInput.click();
      });

      lasFileInput.addEventListener("change", () => {
        loadLasFile(lasFileInput.files && lasFileInput.files[0]);
        lasFileInput.value = "";
      });

      liveStreamButton.addEventListener("click", switchToLiveStream);

      clearViewerButton.addEventListener("click", clearViewerState);

      flipCloudButton.addEventListener("click", () => {
        const undoState = captureUndoState("Flip point cloud");
        flipPointCloud = !flipPointCloud;
        pushUndoState("Flip point cloud", undoState);
        clearProcessingSelection();
        reapplyPointCloudOrientation();
        updateFlipButton();
        sendPatchworkControl(patchworkRealtimeActive);
        updateCalibrationDisplay();
        sendCalibrationToServer(false);
        setOperationStatus(
          flipPointCloud
            ? "Point cloud flip enabled: y/z axes inverted"
            : "Point cloud flip disabled",
        );
      });

      filterStructureButton.addEventListener("click", filterStructure);

      clusterButton.addEventListener("click", (event) => {
        event.stopPropagation();
        clusterMenu.classList.toggle("hidden");
      });

      clusterMenu.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-object-type]");
        if (!button) {
          return;
        }
        clusterMenu.classList.add("hidden");
        autoDetectPile(button.dataset.objectType);
      });

      debugClusterButton.addEventListener("click", () => {
        const stages = pileMask && pileMask.debugStages ? pileMask.debugStages : [];
        if (stages.length === 0) {
          setOperationStatus("Debug failed: run Cluster -> Stockpile first", true);
          return;
        }
        if (!stockpileDebugActive) {
          stockpileDebugActive = true;
          stockpileDebugStageIndex = 0;
        } else {
          stockpileDebugStageIndex++;
          if (stockpileDebugStageIndex >= stages.length) {
            stockpileDebugActive = false;
            stockpileDebugStageIndex = 0;
          }
        }
        updateDebugClusterButton();
        updateDisplayedPoints();
        if (stockpileDebugActive) {
          const stage = stages[stockpileDebugStageIndex % stages.length];
          setOperationStatus(
            `Debug stage: ${stage.name}; green=${stage.cells.size.toLocaleString()} cells, red=final cluster`,
          );
        } else {
          setOperationStatus("Debug disabled");
        }
      });

      document.addEventListener("click", (event) => {
        if (!clusterMenu.classList.contains("hidden") && !event.target.closest(".cluster-control")) {
          clusterMenu.classList.add("hidden");
        }
      });

      sourceSelect.addEventListener("change", () => {
        switchPointCloudSource(Number(sourceSelect.value));
      });

      window.addEventListener("resize", resizeCanvas);
      setupSourceSelect();
      updateLiveButton();
      updateFlipButton();
      updateDebugClusterButton();
      updateCalculateButtonState();
      updateCalibrationDisplay();
      requestAnimationFrame(render);
    </script>
  </body>
</html>
