/**:
  ros__parameters:
    save_flag: true

    sensor_height: 0.33

    mode: "czm"
    verbose: false
    visualize: true

    num_iter: 3
    num_lpr: 20
    num_min_pts: 10
    th_seeds: 0.20
    th_dist: 0.10
    th_seeds_v: 0.25
    th_dist_v: 0.1
    max_r: 30.0
    min_r: 0.5
    uprightness_thr: 0.707

    adaptive_seed_selection_margin: -1.2
    czm:
      num_zones: 4
      num_sectors_each_zone: [16, 32, 54, 32]
      mum_rings_each_zone: [2, 4, 4, 4]
      elevation_thresholds: [0.0, 0.0, 0.0, 0.0]
      flatness_thresholds: [0.0, 0.0, 0.0, 0.0]

    enable_RNR: true
    enable_RVPF: true
    enable_TGR: true

    RNR_ver_angle_thr: -15.0
    RNR_intensity_thr: 0.2
